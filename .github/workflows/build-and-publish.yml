name: build-and-publish

on:
  push:
    branches:
      - "master"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Build
        run: |
          uv build
          pip install dist/*.whl
          echo "PACKAGE_VERSION=$(pip show pdf-helper | grep '^Version: ' | cut -d ' ' -f 2)" >> $GITHUB_ENV

      - name: check-version
        uses: KyoriPowered/action-regex-match@v3
        id: check-version
        with:
          text: ${{ env.PACKAGE_VERSION }}
          regex: '\d+\.\d+\.\d+a\d+'

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

    outputs:
      version: ${{ env.PACKAGE_VERSION }}
      is_alpha: ${{ steps.check-version.outputs.match }}

  release:
    name: Auto Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.is_alpha == '' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "${{ needs.build.outputs.version }}"
          title: "Auto Build"
          files: |
            dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.is_alpha == '' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
